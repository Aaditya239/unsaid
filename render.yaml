# Render Blueprint — auto-provisions backend + Postgres
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: unsaid-db
    plan: free
    databaseName: unsaid
    user: unsaid_user
    region: oregon

services:
  - type: web
    name: unsaid-api
    runtime: node
    plan: free
    region: oregon
    rootDir: server
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: unsaid-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "15m"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"
      - key: COOKIE_SECURE
        value: "true"
      - key: FRONTEND_URL
        sync: false   # Set manually after deploying Vercel frontend
      - key: GROQ_API_KEY
        sync: false   # Set manually from https://console.groq.com
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
